{{- if .Values.postgres.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.postgres.name }}
  namespace: {{ .Values.postgres.namespace }}
spec:
  replicas: {{ .Values.postgres.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.postgres.labels.app }}
  template:
    metadata:
      labels:
        app: {{ .Values.postgres.labels.app }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.postgres.ports.containerPort }}
          env:
            - name: POSTGRES_PASSWORD
              value: "{{ .Values.postgres.env.password }}"
            - name: POSTGRES_DB
              value: "{{ .Values.postgres.env.database }}"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ .Values.postgres.persistence.existingClaim | default "postgres-pvc" }}
{{- end }}
